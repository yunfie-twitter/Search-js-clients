name: Dependency Review

on:
  pull_request:
    branches: [main]

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # 脆弱性が見つかったとき PR にコメントを投稿
          comment-summary-in-pr: always
          # critical ・ high の CVSS スコアを持つ脆弱性をブロック
          fail-on-severity: high
          # GPL 等のコピーレフトライセンスを拒否
          deny-licenses: GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0, AGPL-1.0, AGPL-3.0
